replicaCount: 3

config:
  gcpProjectId: mcp-rag-prod
  pubsubProjectId: mcp-rag-prod
  pubsubSubscription: document-ingestion-sub-prod
  collectionName: DocumentChunk
  weaviateUrl: http://weaviate.rag-prod.svc.cluster.local:80

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 2Gi
env:
  CLUSTER_HOSTNAME: "weaviate-node-1"
  RAFT_JOIN: "weaviate-node-1"
  RAFT_BOOTSTRAP_EXPECT: "1"
  CLUSTER_JOIN: "weaviate-headless.rag.svc.cluster.local."      