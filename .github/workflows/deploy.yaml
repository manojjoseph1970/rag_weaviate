name: Deploy RAG Application to GKE

on:
  push:
    branches:
      - main

  workflow_dispatch:

concurrency:
  group: rag-app-production
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: mcp-rag-dev-502016
  REGION: us-central1
  CLUSTER_NAME: rag-cluster
  GKE_LOCATION: us-central1
  ARTIFACT_REPOSITORY: rag-images
  IMAGE_NAME: rag-app
  RELEASE_NAME: rag-app
  NAMESPACE: rag
  HELM_CHART: ./helm/rag-app
  VALUES_FILE: ./helm/rag-app/values-prod.yaml
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run checks
        env:
          GCP_PROJECT_ID: test-project
          PUBSUB_PROJECT_ID: test-project
          PUBSUB_SUBSCRIPTION: test-subscription
          COLLECTION_NAME: DocumentChunk
          WEAVIATE_URL: http://localhost:8080
          OPENAI_API_KEY: test-key
        run: |
          ruff check app tests
          python -m pytest tests -q

  build:
    name: Build and push image
    needs: test
    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.image.outputs.image }}
      tag: ${{ steps.image.outputs.tag }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_CICD_SERVICE_ACCOUNT }}

      - name: Set up Google Cloud CLI
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker authentication
        run: |
          gcloud auth configure-docker \
            "${REGION}-docker.pkg.dev" \
            --quiet

      - name: Generate image information
        id: image
        shell: bash
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REPOSITORY}/${IMAGE_NAME}"
          TAG="${GITHUB_SHA}"

          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          docker build \
            --tag "${{ steps.image.outputs.image }}:${{ steps.image.outputs.tag }}" \
            --tag "${{ steps.image.outputs.image }}:latest" \
            .

      - name: Push Docker image
        run: |
          docker push "${{ steps.image.outputs.image }}:${{ steps.image.outputs.tag }}"
          docker push "${{ steps.image.outputs.image }}:latest"

  deploy:
    name: Deploy to GKE
    needs: build
    runs-on: ubuntu-latest
    environment: development

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_CICD_SERVICE_ACCOUNT }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v3
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          location: ${{ env.GKE_LOCATION }}
          project_id: ${{ env.PROJECT_ID }}
      - name: Ensure namespace exists
        run: |
          kubectl create namespace "${NAMESPACE}" \
            --dry-run=client \
            -o yaml | kubectl apply -f -    

      - name: Create OpenAI Kubernetes Secret

        run: |
            test -n "$OPENAI_API_KEY" || {
              echo "OPENAI_API_KEY is not configured"
              exit 1
            }

            kubectl create secret generic rag-app-secrets \
              --namespace "${NAMESPACE}" \
              --from-literal=OPENAI_API_KEY="$OPENAI_API_KEY" \
              --dry-run=client \
              -o yaml | kubectl apply -f -

      - name: Verify secret
        run: |
          kubectl get secret rag-app-secrets \
            --namespace "${NAMESPACE}"      

      - name: Validate Helm chart
        run: |
          helm lint "${HELM_CHART}" \
            --values "${VALUES_FILE}" \
            --set-string image.repository="${{ needs.build.outputs.image }}" \
            --set-string image.tag="${{ needs.build.outputs.tag }}"

          helm template "${RELEASE_NAME}" "${HELM_CHART}" \
            --namespace "${NAMESPACE}" \
            --values "${VALUES_FILE}" \
            --set-string image.repository="${{ needs.build.outputs.image }}" \
            --set-string image.tag="${{ needs.build.outputs.tag }}" \
            > rendered-manifests.yaml

      - name: Deploy with Helm
        run: |
          helm upgrade --install "${RELEASE_NAME}" "${HELM_CHART}" \
            --namespace "${NAMESPACE}" \
            --create-namespace \
            --values "${VALUES_FILE}" \
            --set-string image.repository="${{ needs.build.outputs.image }}" \
            --set-string image.tag="${{ needs.build.outputs.tag }}" \
            --atomic \
            --wait \
            --timeout 10m

      - name: Verify API rollout
        run: |
          kubectl rollout status \
            deployment/rag-app \
            --namespace "${NAMESPACE}" \
            --timeout=5m

      - name: Verify worker rollout
        run: |
          kubectl rollout status \
            deployment/rag-app-worker \
            --namespace "${NAMESPACE}" \
            --timeout=5m

      - name: Show deployment state
        if: always()
        run: |
          kubectl get pods \
            --namespace "${NAMESPACE}" \
            --output=wide

          kubectl get services \
            --namespace "${NAMESPACE}"

          helm status "${RELEASE_NAME}" \
            --namespace "${NAMESPACE}" || true

      - name: Collect diagnostics after failure
        if: failure()
        run: |
          kubectl describe pods \
            --namespace "${NAMESPACE}" || true

          kubectl get events \
            --namespace "${NAMESPACE}" \
            --sort-by=.metadata.creationTimestamp || true

          kubectl logs \
            deployment/rag-app \
            --namespace "${NAMESPACE}" \
            --all-containers \
            --tail=200 || true

          kubectl logs \
            deployment/rag-app-worker \
            --namespace "${NAMESPACE}" \
            --all-containers \
            --tail=200 || true